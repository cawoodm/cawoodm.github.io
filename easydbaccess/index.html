<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easyDBAccess v0.0.30</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      /*
       * Light-DOM container that jsPanels mount into. Fixed between the
       * app-shell's header and footer (their heights are pinned by their
       * own CSS: ~48px each). Panels are constrained to this region by
       * jsPanel's dragit.containment, so they can never overlap the chrome.
       */
      #easydb-panels {
        position: fixed;
        top: 48px;
        bottom: 48px;
        left: 0;
        right: 0;
        overflow: hidden;
        pointer-events: none;
      }
      /* Inner viewport that pan/zoom transforms. jsPanels mount here; it fills
         the overlay, so panel geometry stays in the same layout coordinates
         jsPanel already uses (transform is purely visual). */
      #easydb-panels-viewport {
        position: absolute;
        inset: 0;
        transform-origin: 0 0;
        pointer-events: none;
      }
      /* Panels themselves AND the minimized dock both need clicks. */
      #easydb-panels-viewport > .jsPanel,
      #easydb-panels-viewport > .jsPanel-minimized-container {
        pointer-events: auto;
      }
      /* Make sure the minimized dock sits at the bottom of the container
         (just above the footer) regardless of jsPanel's default. */
      #easydb-panels-viewport > .jsPanel-minimized-container {
        bottom: 0;
        left: 0;
      }
      /* On touch devices the overlay itself becomes pointer-interactive so it
         can catch pan/zoom gestures on the empty canvas background. On desktop
         it stays click-through (pointer-events:none) — unchanged behaviour. */
      @media (pointer: coarse) {
        #easydb-panels {
          pointer-events: auto;
        }
      }
    </style>
    <script type="module" crossorigin src="/easydbaccess/assets/index-DU_ERvRg.js"></script>
    <link rel="stylesheet" crossorigin href="/easydbaccess/assets/index-CTqirG62.css">
  </head>
  <body>
    <app-shell></app-shell>
    <div id="easydb-panels"><div id="easydb-panels-viewport"></div></div>
    <filter-popover></filter-popover>
  </body>
</html>
