<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="image/png" sizes="96x96" rel="icon" href="favicon.png" />
    <title>MinniDBMax v0.0.19</title>
    <script type="module" crossorigin src="/minnidbmax/assets/index-ljQ0RfB7.js"></script>
    <link rel="stylesheet" crossorigin href="/minnidbmax/assets/index-CPRXHt7X.css">
  </head>
  <body>
    <header class="flex items-center justify-between gap-4 px-4 py-2 bg-slate-800 text-white shadow-md">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-semibold tracking-wide">MinniDBMax</h1>
        <span class="text-xs text-slate-400">v0.0.19</span>
        <select id="workspaceSelect" class="bg-slate-700 text-white rounded px-2 py-1 text-sm border border-slate-600 focus:outline-none focus:ring-1 focus:ring-blue-400"></select>
      </div>
      <div class="flex items-center gap-2">
        <button id="addTable" class="rounded bg-blue-600 hover:bg-blue-500 px-3 py-1.5 text-sm font-medium transition-colors">+ New Table</button>
        <button id="dataPush" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-1.5 text-sm transition-colors inline-flex items-center gap-1.5" title="Push data to Gist">
          <span class="material-icons text-lg leading-none">cloud_upload</span>Push
        </button>
        <button id="dataPull" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-1.5 text-sm transition-colors inline-flex items-center gap-1.5" title="Pull data from Gist">
          <span class="material-icons text-lg leading-none">cloud_download</span>Pull
        </button>
        <button id="dataDump" class="rounded bg-slate-700 hover:bg-slate-600 px-3 py-1.5 text-sm transition-colors inline-flex items-center gap-1.5" title="Dump data to file">
          <span class="material-icons text-lg leading-none">archive</span>Dump
        </button>
      </div>
    </header>

    <style>
      #empty-state {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 40px 60px;
        border: 4px dotted #888;
        border-radius: 8px;
        color: #666;
        font-family: Arial, sans-serif;
        font-size: 18px;
        background: rgba(255, 255, 255, 0.6);
        pointer-events: none;
        text-align: center;
      }
      #empty-state.hide {
        display: none;
      }
    </style>
    <div id="empty-state" class="hide">drag and drop a .csv file here to begin...</div>

    <template id="data-entry-template">
      <style>
        :host {
          display: block;
          font-family: Arial, sans-serif;
          height: 100%;
          box-sizing: border-box;
        }
        .container {
          display: flex;
          flex-direction: column;
          width: 100%;
          height: 100%;
          margin: 0;
        }
        .outer-container {
          display: flex;
          flex-direction: column;
          flex: 1 1 auto;
          min-height: 0;
        }
        .table-container {
          flex: 1 1 auto;
          min-height: 0;
          overflow: auto;
        }
        .input-container {
          flex: 0 0 auto;
          margin-bottom: 15px;
        }
        tr.virtual-spacer td {
          padding: 0;
          border: 0;
        }
        td.editable {
          cursor: text;
        }
        td.editable:hover {
          background-color: #fafafa;
        }
        input.dataInput {
          border: 0px;
          border-radius: 4px;
          width: 100%;
          height: 100%;
          box-sizing: border-box;
          padding: 5px;
          font-size: medium;
        }
        td.number input.dataInput {
          text-align: right;
        }
        .data-input {
          flex-grow: 1;
          padding: 10px;
          font-size: 16px;
          border: 1px solid #ddd;
          border-radius: 4px;
        }
        .hide {
          display: none;
        }
        table {
          width: 100%;
          border-collapse: collapse;
        }
        th,
        td {
          padding: 12px;
          text-align: left;
          border-bottom: 1px solid #ddd;
          text-overflow: ellipsis;
          white-space: nowrap;
          overflow: hidden;
        }
        th.number,
        td.number,
        td.number input.dataInput {
          text-align: right;
        }
        td.null {
          background-color: #f9dddd;
        }
        th.actions,
        td.actions {
          text-align: center;
        }
        th.row-actions,
        td.row-actions {
          width: 24px;
          padding: 0 2px;
          text-align: center;
          border-bottom: 1px solid #ddd;
        }
        tr.filter-row td {
          padding: 4px 6px;
          background-color: #fafafa;
          /* Stick just below the column-header row; box-shadow trick mirrors the
             <th> sticky workaround needed under border-collapse: collapse. */
          position: sticky;
          top: 44px;
          z-index: 1;
          box-shadow: inset 0 -1px 0 #ddd;
        }
        input.filter-input {
          width: 100%;
          padding: 4px 8px;
          font-size: 13px;
          color: #333;
          background-color: #fff;
          border: 1px solid #d0d0d0;
          border-radius: 3px;
          box-sizing: border-box;
          outline: none;
          transition:
            border-color 0.12s,
            box-shadow 0.12s;
        }
        input.filter-input:focus {
          border-color: #60a5fa;
          box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.25);
        }
        input.filter-input::placeholder {
          color: #b0b0b0;
        }
        button.row-menu {
          opacity: 0;
          background: none;
          border: 0;
          cursor: pointer;
          padding: 2px 6px;
          font-size: 18px;
          line-height: 1;
          color: #555;
          border-radius: 3px;
          transition:
            opacity 0.12s,
            background-color 0.12s;
        }
        tr.data-row:hover button.row-menu {
          opacity: 1;
        }
        button.row-menu:hover {
          background-color: #eee;
        }
        th {
          background-color: #f2f2f2;
          cursor: pointer;
          position: sticky;
          top: 0;
          z-index: 1;
          box-shadow: inset 0 -1px 0 #ddd;
        }
        th:hover {
          background-color: #e8e8e8;
        }
        th::after {
          content: "";
          display: inline-block;
          width: 0;
          height: 0;
          margin-left: 5px;
        }
        th.asc::after {
          content: "▲";
          font-size: 10px;
        }
        th.desc::after {
          content: "▼";
          font-size: 10px;
        }
        .delete-btn {
          background-color: #fff;
          background-image: url(./icon-delete.svg);
          background-size: 24px auto;
          color: white;
          border: none;
          border-radius: 4px;
          padding: 5px 10px;
          cursor: pointer;
        }
        .delete-btn:hover {
          background-color: #fdd;
        }
        .column-name {
          cursor: text;
        }
        .key-indicator {
          margin-left: 6px;
          font-size: 0.85em;
          color: #777;
          font-weight: bold;
          vertical-align: middle;
        }
        .empty-message {
          padding: 15px;
          background-color: #f9f9f9;
          text-align: center;
          border-radius: 4px;
        }

        .resizer {
          width: 5px;
          height: 5px;
          background: #333;
          position: absolute;
        }
        .title {
          font-size: 1.5em;
          padding: 10px;
          cursor: move;
          background-color: #cacaca;
          border-radius: 8px;
        }
        summary {
          cursor: pointer;
          list-style: none;
        }
      </style>

      <div class="container">
        <div class="outer-container">
          <div class="input-container">
            <div style="display: flex">
              <textarea class="data-input" placeholder='Drag a .csv here or enter some CSV values (e.g. "Text", Category, 12.93, 2024-01-01, true)'></textarea>
            </div>
          </div>
          <div class="table-container"></div>
        </div>
      </div>
    </template>
  </body>
</html>
