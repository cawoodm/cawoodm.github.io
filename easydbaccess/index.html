<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easyDBAccess v0.0.53</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      /*
       * Light-DOM container that jsPanels mount into. Fixed between the
       * app-shell's header and footer (their heights are pinned by their
       * own CSS: ~48px each), with overflow hidden. Panels drag freely with
       * no containment — they may extend past this region or off-screen; the
       * pan/zoom canvas (touch pan / desktop right-drag) brings them back.
       * The chrome keeps a higher z-index so panels never cover it.
       */
      #easydb-panels {
        position: fixed;
        top: 48px;
        bottom: 48px;
        left: 0;
        right: 0;
        overflow: hidden;
        pointer-events: none;
      }
      /* Inner viewport that pan/zoom transforms. jsPanels mount here; it fills
         the overlay, so panel geometry stays in the same layout coordinates
         jsPanel already uses (transform is purely visual). */
      #easydb-panels-viewport {
        position: absolute;
        inset: 0;
        transform-origin: 0 0;
        pointer-events: none;
        z-index: 2; /* above the minimized dock (z-index:1) so windows float over it */
      }
      /* Panels need clicks; the transparent viewport itself does not. */
      #easydb-panels-viewport > .jsPanel {
        pointer-events: auto;
      }
      /* Minimized-window dock. It lives OUTSIDE the pan/zoom viewport (a child
         of the fixed overlay), so minimized windows stay pinned to the bottom-
         left of the table area and do NOT move when the canvas is panned or
         zoomed. It sits below the viewport (z-index:1 < 2) so active windows
         float above it — but shows through the viewport's empty space. The dock
         is click-through; only the minimized bars inside it take pointer events. */
      #easydb-minimized-dock {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 1;
        max-width: 100%;
        display: flex;
        flex-wrap: wrap-reverse;
        align-content: flex-end;
        gap: 4px;
        padding: 4px;
        pointer-events: none;
      }
      #easydb-minimized-dock > .jsPanel-replacement {
        pointer-events: auto;
        position: static;
        margin: 0;
      }
      /* On touch devices the overlay itself becomes pointer-interactive so it
         can catch pan/zoom gestures on the empty canvas background. On desktop
         it stays click-through (pointer-events:none) — unchanged behaviour. */
      @media (pointer: coarse) {
        #easydb-panels {
          pointer-events: auto;
        }
      }
    </style>
    <script type="module" crossorigin src="/easydbaccess/assets/index-CYj0SXdT.js"></script>
    <link rel="stylesheet" crossorigin href="/easydbaccess/assets/index-CTqirG62.css">
  </head>
  <body>
    <app-shell></app-shell>
    <div id="easydb-panels">
      <div id="easydb-panels-viewport"></div>
      <div id="easydb-minimized-dock"></div>
    </div>
    <filter-popover></filter-popover>
  </body>
</html>
